services:
    nginx:
      image: nginx:alpine
      container_name: codesnip-nginx
      restart: unless-stopped
      ports:
        - "${APP_PORT:-80}:80"
        - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
      volumes:
        - .:/var/www/html
        - ./docker/nginx/conf.d:/etc/nginx/conf.d
      networks:
        sail:
          aliases:
            - webserver
      depends_on:
        laravel.test:
          condition: service_healthy
    laravel.test:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                MYSQL_CLIENT: mariadb-client
                NODE_VERSION: '${NODE_VERSION:-24}'
                PUBLIC_BUILD_DNS: '${PUBLIC_BUILD_DNS:-1}'
        image: 'sail-8.5/app'
        container_name: codesnip-php
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        expose:
          - "9000"
          - "5173"
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-develop,debug}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003 idekey=PHPSTORM}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            PHP_IDE_CONFIG: 'serverName=codesnip'
        volumes:
            - '.:/var/www/html'
        networks:
          sail:
            aliases:
              - php
              - laravel.test
        depends_on:
            - mariadb
            - mongodb
            - redis
            - meilisearch
        healthcheck:
          test: [ "CMD", "php-fpm8.5", "-t" ]
          interval: 10s
          timeout: 5s
          retries: 3
    # Queue worker (respects QUEUE_CONNECTION in .env). Horizon needs redis — see .env.example.
    laravel.queue:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                MYSQL_CLIENT: mariadb-client
                NODE_VERSION: '${NODE_VERSION:-24}'
                PUBLIC_BUILD_DNS: '${PUBLIC_BUILD_DNS:-1}'
        image: 'sail-8.5/app'
        container_name: codesnip-queue
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mariadb:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        command: php artisan queue:work --verbose --tries=3 --timeout=120 --sleep=3 --max-time=3600
    mariadb:
        image: 'mariadb:11'
        container_name: codesnip-mariadb
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - 'sail-mariadb:/var/lib/mysql'
            - './docker/mariadb/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - healthcheck.sh
                - '--connect'
                - '--innodb_initialized'
            retries: 3
            timeout: 5s
    mongodb:
        image: 'mongodb/mongodb-atlas-local:latest'
        container_name: codesnip-mongodb
        environment:
            - 'MONGODB_INITDB_ROOT_USERNAME=${MONGODB_USERNAME:-}'
            - 'MONGODB_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-}'
        volumes:
            - 'sail-mongodb:/data/db'
        ports:
            - '${FORWARD_MONGODB_PORT:-27017}:27017'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mongosh
                - 'mongodb://localhost:27017/admin'
                - '--eval=db.runCommand({ping:1})'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        container_name: codesnip-redis
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    meilisearch:
        image: 'getmeili/meilisearch:latest'
        container_name: codesnip-meilisearch
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
    ollama:
      image: 'ollama/ollama:latest'
      container_name: codesnip-ollama
      ports:
        - '${FORWARD_OLLAMA_PORT:-11434}:11434'
      volumes:
        - 'sail-ollama:/root/.ollama'
      networks:
        - sail
      environment:
        - OLLAMA_KEEP_ALIVE=24h
        - OLLAMA_HOST=0.0.0.0
        - OLLAMA_NUM_PARALLEL=2
        - OLLAMA_MAX_LOADED_MODELS=1
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]

networks:
  sail:
    driver: bridge

volumes:
  sail-mariadb:
    driver: local
  sail-mongodb:
    driver: local
  sail-redis:
    driver: local
  sail-meilisearch:
    driver: local
  sail-ollama:
    driver: local
